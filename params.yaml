data:
  random_seed: 42
  test_size: 0.2
  val_size: 0.1
  stratify: true
preprocessing:
  numeric_scaler: StandardScaler
  categorical_encoder: OrdinalEncoder
  handle_missing: true
model:
  type: LightGBM
  random_seed: 42
  class_weight: balanced
hyperparameters:
  num_leaves: 31
  learning_rate: 0.05
  n_estimators: 100
  max_depth: -1
  scale_pos_weight: 7.16
calibration:
  method: sigmoid
  cv: 5
threshold:
  method: cost_matrix
  false_negative_cost: 50000
  false_positive_cost: 3000
  optimal_threshold: 0.04
